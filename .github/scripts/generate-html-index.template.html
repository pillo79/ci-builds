<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Core CI Registry</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; padding: 20px; color: #212529; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .search-container { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px 15px; font-size: 16px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out; }
        #searchInput:focus { border-color: #86b7fe; outline: 0; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); }
        .grid-row { display: grid; grid-template-columns: 32px 3fr 3fr 2fr; gap: 15px; padding: 10px 15px; align-items: center; }
        .table-header { font-weight: 700; background: #e9ecef; border-bottom: 2px solid #dee2e6; border-radius: 4px; }
        .sortable { cursor: pointer; user-select: none; padding: 5px; border-radius: 4px; transition: background 0.1s; }
        .sortable:hover { background: #dee2e6; }
        summary { cursor: pointer; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        .file-item { border-bottom: none; box-shadow: 0 1px 0 0 #e9ecef; }
        .summary-row { font-weight: 600; }
        .summary-row:hover { background: #f8f9fa; }
        .sub-group { margin-left: 20px; border-left: 3px solid #adb5bd; margin-bottom: 5px; }
        .sub-group::after { content: ''; display: block; border-top: 1px solid #e9ecef; }
        .sub-summary-row { background: #fdfdfd; font-size: 0.95em; font-weight: 500; border-bottom: 1px solid #f1f3f5; }
        .sub-summary-row:hover { background: #f1f3f5; }
        .detail-row { background: #ffffff; margin-left: 20px; font-size: 0.85em; border-bottom: 1px dashed #f1f3f5; }
        /* Row left borders to match badges */
        .sub-group:has(.badge-platform) { border-left-color: #badbcc; }
        .sub-group:has(.badge-tool)     { border-left-color: #88b4fc; }
	.detail-row:last-child { border-bottom: none; }
        .tree-branch { color: #adb5bd; margin-right: 8px; font-weight: 400; }
        a { color: #0d6efd; text-decoration: none; }
        a:hover { text-decoration: underline; }
	.badge { display: inline-block; padding: 0.35em 0.65em; font-size: 0.85em; font-weight: 600; line-height: 1; text-align: center; white-space: nowrap; vertical-align: baseline; border-radius: 50rem; margin-right: 5px; }
	.badge-branch { color: #664d03; background-color: #fff3cd; border: 1px solid #ffecb5; }
	.badge-platform { color: #0f5132; background-color: #d1e7dd; /* Light green */ border: 1px solid #badbcc; }
	.badge-tool { color: #2862c8; background-color: #dfefff; /* Light blue */ border: 1px solid #b6d4fe; }
	.badge-official  { color: #41464b; background-color: #e2e3e5; border: 1px solid #d3d6d8; }
	.badge-tag       { color: #1a7f37; background-color: #dafbe1; border: 1px solid #aceebb; }
        .official-item { display: none; }
        .official-item, .official-item > .sub-group > .grid-row { color: #808080; }
        #emptyMessage { display: none; padding: 20px; text-align: center; color: #adb5bd; font-style: italic; }
        footer { margin-top: 24px; padding-top: 12px; border-top: 1px solid #dee2e6; text-align: right; font-size: 0.8em; color: #adb5bd; }
        .commit-tooltip { position: absolute; z-index: 100; background: #1b1f23; color: #e6edf3; padding: 8px 12px; border-radius: 6px; font-size: 0.82em; max-width: 420px; white-space: pre-wrap; word-break: break-word; box-shadow: 0 2px 8px rgba(0,0,0,0.3); pointer-events: none; line-height: 1.4; }
        .commit-tooltip .commit-stats { font-size: 0.9em; margin-top: 4px; }
        .commit-tooltip .stat-add { color: #3fb950; }
        .commit-tooltip .stat-del { color: #f85149; }
        .commit-tooltip .stat-files { color: #d29922; }
        .commit-inline { display: block; font-size: 0.85em; color: #6c757d; font-style: italic; }
        .activity-cell { text-align: center; font-size: 1.1em; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .page-header img { width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0; }
        .page-header-content { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .page-header h2 { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <img src="https://avatars.githubusercontent.com/u/4233897?v=4" alt="Arduino CI">
            <div class="page-header-content">
                <h2>Core CI Registry</h2>
                <input type="text" id="searchInput" placeholder="Filter by packager, tool, version (e.g. 'ubuntu v1.2.1')...">
            </div>
        </div>
        <div class="grid-row table-header" id="tableHeader">
            <span></span>
            <span class="sortable" data-col="1">Name ↕</span>
            <span class="sortable" data-col="2">Latest Version ↕</span>
            <span class="sortable" data-col="3">Last Modified ↕</span>
        </div>

        <div id="emptyMessage">No matching results.</div>
        <div id="fileList">
            {{ FILE_LIST_CONTENT }}
        </div>

        <footer>Last updated: <span class="ts" data-ts="{{ GENERATED_AT }}">{{ GENERATED_AT }}</span></footer>
    </div>
    <script>
        // Age formatting
        function fmtAge(ts) {
            if (!ts) return '';
            const dt = new Date(ts);
            if (isNaN(dt)) return ts;
            const deltaMs = Date.now() - dt.getTime();
            const deltaDays = Math.floor(deltaMs / 86400000);
            let age;
            if (deltaDays === 0) {
                const hours = Math.floor(deltaMs / 3600000);
                age = hours < 1 ? 'just now \u2728' : `${hours} hour${hours > 1 ? 's' : ''} ago`;
            } else if (deltaDays < 7) {
                age = `${deltaDays} day${deltaDays > 1 ? 's' : ''} ago`;
            } else if (deltaDays < 30) {
                const weeks = Math.floor(deltaDays / 7);
                age = `${weeks} week${weeks > 1 ? 's' : ''} ago`;
            } else if (deltaDays < 365) {
                const months = Math.floor(deltaDays / 30);
                age = `${months} month${months > 1 ? 's' : ''} ago`;
            } else {
                const years = Math.floor(deltaDays / 365);
                age = `over ${years === 1 ? 'a' : years} year${years > 1 ? 's' : ''} ago`;
            }
            const pad = n => String(n).padStart(2, '0');
            const display = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
            return `${display}<br>(${age})`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('span.ts[data-ts]').forEach(el => {
                el.innerHTML = fmtAge(el.dataset.ts);
            });

            // Activity icon in the leftmost cell of branch summary rows
            function activityIcon(ts) {
                if (!ts) return '';
                const age = Date.now() - new Date(ts).getTime();
                const h = 3600000, d = 86400000;
                if (age < 24 * h)      return '<span title="New (< 24h)">✨</span> ';
                if (age < 15 * d)      return '<span title="Active (< 15 days)">🟢</span> ';
                if (age < 180 * d)     return '<span title="Sleeping (< 6 months)">💤</span> ';
                return '<span title="Frozen (> 6 months)">🧊</span> ';
            }

            document.querySelectorAll('.file-item:not(.official-item) > summary.summary-row').forEach(row => {
                const tsEl = row.children[3]?.querySelector('[data-ts]');
                const ts = tsEl?.dataset.ts;
                const iconCell = row.children[0];
                if (iconCell && ts) {
                    iconCell.innerHTML = activityIcon(ts);
                }
            });
        });

        // Filtering Logic
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchWords = e.target.value.toLowerCase().split(/\s+/).filter(word => word.length > 0);
            const fileItems = document.querySelectorAll('.file-item');

            fileItems.forEach(item => {
                if (searchWords.length === 0) {
                    item.style.display = item.classList.contains('official-item') ? 'none' : 'block';
                    item.open = false;
                    item.querySelectorAll('.sub-group').forEach(sub => { sub.open = false; sub.style.display = ''; });
                    item.querySelectorAll('.detail-row').forEach(row => row.style.display = '');
                    return;
                }

                // Filter detail rows, then cascade up
                item.querySelectorAll('.detail-row').forEach(row => {
                    const rowText = row.textContent.toLowerCase();
                    row.style.display = searchWords.every(w => rowText.includes(w)) ? '' : 'none';
                });

                let itemHasVisible = false;
                item.querySelectorAll('.sub-group').forEach(sub => {
                    const headerText = sub.querySelector('.sub-summary-row').textContent.toLowerCase();
                    const headerMatches = searchWords.every(w => headerText.includes(w));
                    const anyVisible = Array.from(sub.querySelectorAll('.detail-row'))
                                            .some(r => r.style.display !== 'none');
                    const show = anyVisible || headerMatches;
                    sub.style.display = show ? '' : 'none';
                    if (show) { itemHasVisible = true; }
                    // only expand if necessary (only detail rows matched)
                    sub.open = anyVisible && !headerMatches;
                });

                item.style.display = itemHasVisible ? 'block' : 'none';
                if (itemHasVisible) item.open = true;
            });
            const anyVisible = Array.from(fileItems).some(i => i.style.display !== 'none');
            document.getElementById('emptyMessage').style.display = (searchWords.length > 0 && !anyVisible) ? 'block' : 'none';
        });

        // Sorting Logic
        let currentSortCol = -1;
        let sortAsc = true;

        document.querySelectorAll('.sortable').forEach(header => {
            header.addEventListener('click', () => {
                const colIndex = parseInt(header.getAttribute('data-col'));
                const fileList = document.getElementById('fileList');
                const items = Array.from(fileList.querySelectorAll(':scope > .file-item'));

                if (currentSortCol === colIndex) {
                    sortAsc = !sortAsc;
                } else {
                    currentSortCol = colIndex;
                    sortAsc = true;
                }

                document.querySelectorAll('.sortable').forEach(el => {
                    let text = el.textContent.replace(' ▲', '').replace(' ▼', '').replace(' ↕', '');
                    if (parseInt(el.getAttribute('data-col')) === colIndex) {
                        el.textContent = text + (sortAsc ? ' ▲' : ' ▼');
                    } else {
                        el.textContent = text + ' ↕';
                    }
                });

                items.sort((a, b) => {
                    const aSpan = a.querySelector('.summary-row').children[colIndex];
                    const bSpan = b.querySelector('.summary-row').children[colIndex];
                    const aText = aSpan.textContent.trim().toLowerCase();
                    const bText = bSpan.textContent.trim().toLowerCase();

                    if (aText < bText) return sortAsc ? -1 : 1;
                    if (aText > bText) return sortAsc ? 1 : -1;
                    return 0;
                });

                items.forEach(item => fileList.appendChild(item));
            });
        });

        // Commit tooltip on hover
        const commitCache = {};
        let tooltipEl = null;

        function showTooltip(row, html) {
            hideTooltip();
            tooltipEl = document.createElement('div');
            tooltipEl.className = 'commit-tooltip';
            tooltipEl.innerHTML = html;
            document.body.appendChild(tooltipEl);
            positionTooltip(row);
        }

        function positionTooltip(row) {
            if (!tooltipEl) return;
            const rect = row.getBoundingClientRect();
            tooltipEl.style.left = (rect.left + window.scrollX) + 'px';
            tooltipEl.style.top = (rect.bottom + window.scrollY + 4) + 'px';
        }

        function hideTooltip() {
            if (tooltipEl) { tooltipEl.remove(); tooltipEl = null; }
        }

        function parseTreeUrl(el) {
            if (el.dataset.owner && el.dataset.repo && el.dataset.ref) {
                return { owner: el.dataset.owner, repo: el.dataset.repo, ref: el.dataset.ref };
            }
            return null;
        }

        document.getElementById('fileList').addEventListener('mouseover', async (e) => {
            const row = e.target.closest('.grid-row');
            if (!row || row.classList.contains('table-header')) return;
            const info = parseTreeUrl(row);
            if (!info) return;

            const cacheKey = `${info.owner}/${info.repo}/${info.ref}`;
            if (commitCache[cacheKey]) {
                showTooltip(row, commitCache[cacheKey]);
                return;
            }
            showTooltip(row, 'Loading…');
            const data = await fetchWithRetry(`https://api.github.com/repos/${info.owner}/${info.repo}/commits/${info.ref}`);
            const rawMsg = data.commit.message.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const add = data.stats?.additions ?? '?';
            const del = data.stats?.deletions ?? '?';
            const files = data.files?.length ?? '?';
            const stats = `<span class="stat-add">+${add}</span> <span class="stat-del">-${del}</span> lines over <span class="stat-files">${files} file${files !== 1 ? 's' : ''}</span>`;
            const html = `${rawMsg}\n<div class="commit-stats">${stats}</div>`;
            commitCache[cacheKey] = html;
            commitCache[cacheKey + ':msg'] = commitSummary(data.commit.message);
            if (row.matches(':hover')) showTooltip(row, html);
        });

        document.getElementById('fileList').addEventListener('mouseout', (e) => {
            const row = e.target.closest('.grid-row');
            if (row && !row.contains(e.relatedTarget)) hideTooltip();
        });

        // Inline commit message on details open
        async function fetchWithRetry(url) {
            let delay = Math.random() * 1000 + 500; // 500ms to 1500ms
            while (true) {
                try {
                    const resp = await fetch(url);
                    if (resp.status === 403 || resp.status === 429) {
                        await new Promise(r => setTimeout(r, delay));
                        delay = Math.min(delay * 2, 30000);
                        continue;
                    }
                    if (!resp.ok) throw new Error(resp.status);
                    return await resp.json();
                } catch (err) {
                    await new Promise(r => setTimeout(r, delay));
                    delay = Math.min(delay * 2, 30000);
                }
            }
        }

        function commitSummary(message) {
            const lines = message.split('\n');
            const firstWord = (lines[0] || '').trim().split(/\s/)[0];
            if (firstWord === 'Merge') {
                return (lines[2] || lines[0] || '').trim();
            }
            return (lines[0] || '').trim();
        }

        function injectCommitInline(row, text) {
            const versionCell = row.children[2];
            if (!versionCell) return;
            let span = versionCell.querySelector('.commit-inline');
            if (!span) {
                span = document.createElement('span');
                span.className = 'commit-inline';
                versionCell.appendChild(span);
            }
            span.textContent = text;
        }

        document.getElementById('fileList').addEventListener('toggle', async (e) => {
            const details = e.target;
            if (!details.open) return;
            details.querySelectorAll('.detail-row[data-owner][data-ref]').forEach(async (row) => {
                const info = parseTreeUrl(row);
                if (!info) return;
                const cacheKey = `${info.owner}/${info.repo}/${info.ref}`;
                if (commitCache[cacheKey + ':msg'] !== undefined) {
                    injectCommitInline(row, commitCache[cacheKey + ':msg']);
                    return;
                }
                injectCommitInline(row, '⏳');
                const data = await fetchWithRetry(
                    `https://api.github.com/repos/${info.owner}/${info.repo}/commits/${info.ref}`
                );
                const msg = commitSummary(data.commit.message);
                commitCache[cacheKey + ':msg'] = msg;
                injectCommitInline(row, msg);
            });
        }, true); // capture phase to catch events from nested <details>
    </script>
</body>
</html>
