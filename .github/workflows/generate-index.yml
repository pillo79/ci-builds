name: Generate indexes

# Copyright (c) Arduino s.r.l. and/or its affiliated companies
# SPDX-License-Identifier: Apache-2.0

on:
  push:
    paths:
      - 'snippets/**'
  workflow_run:
    workflows: ["Store snippets"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout ci-builds
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need all history to determine the file timestamps

      - name: Checkout package index repo
        uses: actions/checkout@v6
        with:
          path: package_index
          repository: ${{ secrets.PACKAGE_INDEX_REPO }}
          ssh-key: ${{ secrets.PACKAGE_INDEX_DEPLOY_KEY }}

      - name: Setup Python environment
        run: |
          python3 -m venv package_index/venv
          . package_index/venv/bin/activate
          pip install -r package_index/scripts/requirements.txt
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"

      - name: Build per-repo/branch indexes
        run: |
          mkdir -p pages

          echo "Building reference index"
          (cd package_index && scripts/meld.py prod.json prod/ > /dev/null)

          for branch_dir in snippets/*/*/*/; do
            [ -d "$branch_dir" ] || continue
            IFS='/' read -r _ owner repo branch _ <<< "$branch_dir"
            owner="arduino" # FIXME REMOVEME

            # Derive short name: strip optional 'ArduinoCore-' prefix, append branch and _ci suffix.
            # e.g. arduino/ArduinoCore-zephyr / main → arduino_zephyr_main_ci
            short_repo="${repo#ArduinoCore-}"
            index_name="${owner}_${short_repo}_${branch}_ci"

            echo "::group::Building index ${index_name}.json from ${branch_dir}"

            # Platforms: copy from all version subdirs
            mkdir -p "package_index/${index_name}/${owner}/platforms"
            for version_dir in "${branch_dir}"*/; do
              [ -d "${version_dir}platforms" ] || continue
              cp "${version_dir}platforms/"*.json "package_index/${index_name}/${owner}/platforms/" 2>/dev/null || true
            done

            # Copy tools from <indexname>_staging if present (mirrors zephyr_staging → zephyr_ci)
            staging_dir="package_index/${index_name}_staging"
            if [ -d "$staging_dir" ]; then
              (cd "$staging_dir" && for dir in */tools; do
                mkdir -p "../${index_name}/${dir}"
                cp "${dir}"/*.json "../${index_name}/${dir}/"
              done)
            fi

            # Tools: for a release run (max_dir == last_release), include >= prev_release
            # so that 1.1.x tools are also included in the 1.2.0 index.
            # For post-release pre-release runs (max_dir > last_release), include > last_release
            # so that 1.2.0 tools are excluded from the 1.2.1 index.
            tag_file="${branch_dir}tagged-versions"
            last_release=""
            prev_release=""
            if [ -f "$tag_file" ]; then
              last_release=$(tail -1 "$tag_file")
              prev_release=$(tail -2 "$tag_file" | head -1)  # same as last if only one entry
            fi

            version_gte() { [ "$(printf '%s\n' "$1" "$2" | sort -V | head -1)" = "$2" ]; }
            version_gt()  { version_gte "$1" "$2" && [ "$1" != "$2" ]; }

            # Find the maximum version dir present
            max_ver=""
            for vd in "${branch_dir}"*/; do
              [ -d "$vd" ] || continue
              v="${vd%/}"; v="${v##*/}"
              if [ -z "$max_ver" ] || version_gt "$v" "$max_ver"; then max_ver="$v"; fi
            done

            # post-release pre-release: newer dirs exist beyond the last tag
            if [ -n "$last_release" ] && version_gt "$max_ver" "$last_release"; then
              use_strict_gt=true
            else
              use_strict_gt=false
            fi

            mkdir -p "package_index/${index_name}/${owner}/tools"
            for version_dir in "${branch_dir}"*/; do
              [ -d "${version_dir}tools" ] || continue
              ver="${version_dir%/}"; ver="${ver##*/}"
              include=false
              if [ -z "$last_release" ]; then
                include=true
              elif $use_strict_gt && version_gt "$ver" "$last_release"; then
                include=true
              elif ! $use_strict_gt && version_gte "$ver" "$prev_release"; then
                include=true
              fi
              $include && cp "${version_dir}tools/"*.json "package_index/${index_name}/${owner}/tools/" 2>/dev/null || true
            done

            # Generate the final index
            (cd package_index && scripts/meld.py --ref-index prod.json "../pages/${index_name}.json" "${index_name}/")

            echo "::endgroup::"
          done

      - name: Generate index.html
        run: |
          ls pages/
          python3 .github/scripts/generate-html-index.py --owner-repo ${{ github.repository }}
          rm pages/*.srcmap

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages/

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
