name: Generate indexes

# Copyright (c) Arduino s.r.l. and/or its affiliated companies
# SPDX-License-Identifier: Apache-2.0

on:
  push:
  workflow_run:
    workflows: ["Store snippets"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
    steps:
      - name: Checkout ci-builds
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # need all history to determine the file timestamps

      - name: Checkout package index repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: package_index
          repository: ${{ secrets.PACKAGE_INDEX_REPO }}
          ssh-key: ${{ secrets.PACKAGE_INDEX_DEPLOY_KEY }}

      - name: Setup Python environment
        run: |
          python3 -m venv package_index/venv
          . package_index/venv/bin/activate
          pip install -r package_index/scripts/requirements.txt
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"

      - name: Build per-repo/branch indexes
        run: |
          mkdir -p pages

          echo "Building reference index"
          (cd package_index && scripts/meld.py prod.json prod/ > /dev/null)

          for branch_dir in snippets/*/*/*/; do
            [ -d "$branch_dir" ] || continue
            IFS='/' read -r _ owner repo branch _ <<< "$branch_dir"
            owner="arduino" # FIXME REMOVEME

            # Derive short name: strip optional 'ArduinoCore-' prefix, append branch and _ci suffix.
            # e.g. arduino/ArduinoCore-zephyr / main → arduino_zephyr_main_ci
            short_repo="${repo#ArduinoCore-}"
            index_name="${owner}_${short_repo}_${branch}_ci"

            echo "::group::Building index ${index_name}.json from ${branch_dir}"

            # Platforms: copy from all version subdirs
            mkdir -p "package_index/${index_name}/${owner}/platforms"
            echo ${branch_dir}
            for version_dir in "${branch_dir}"*/; do
              [ -d "${version_dir}platforms" ] || continue
              cp "${version_dir}platforms/"*.json "package_index/${index_name}/${owner}/platforms/" 2>/dev/null || true
            done

            # Copy tools from <indexname>_staging if present (mirrors zephyr_staging → zephyr_ci)
            staging_dir="package_index/${short_repo}_staging"
            if [ -d "$staging_dir" ]; then
              (cd "$staging_dir" && for dir in */tools; do
                [ -d "$dir" ] || continue
                mkdir -p "../${index_name}/${dir}"
                cp "${dir}"/*.json "../${index_name}/${dir}/"
              done)
            fi

            # Tool selection logic:
            #
            # - for a generic run, only include the tools that were added since
            #   the last release (if any), with the assumption that every
            #   release includes all the previously built tools.
            #   built after 1.0.0, but not in an index built for the 1.0.0 release.
            #
            # - when tagging a release (max_ver == last_release), as a special
            #   case, include all tools since the *previous* release (if any),
            #   because the public index is not yet updated.
            #
            # Example: a tool added after 1.0.0 will be included in any index
            # since that tool's addition up to -and including- the next tagged
            # release (say. 1.1.0).
            # No tools added before 1.0.0 will be included in those indexes.
            #
            tag_file="${branch_dir}tagged-versions"
            if [ -f "$tag_file" ]; then
              last_release=$(tail -1 "$tag_file")
              prev_release=$(tail -2 "$tag_file" | head -1)  # same as last if only one entry
            fi
            if [ "$last_release" == "$prev_release" ]; then
              # zero or one unique entries in the file - include all tools
              # last_release may be empty if the file is empty
              prev_release="0.0.0"
            fi

            version_max() { printf '%s\n' "$@" | sort -V | tail -n 1; }
            version_gte() { [ "$(version_max "$1" "$2")" = "$1" ]; }
            version_gt()  { version_gte "$1" "$2" && [ "$1" != "$2" ]; }

            # Find the maximum version dir present
            versions=$(cd "$branch_dir" && ls -Ad */ | tr -d '/')
            max_ver=$(version_max $versions)

            if [ "$max_ver" == "$last_release" ]; then
              # this is a release run: include the last release's tools and all newer ones
              include_previous=true
            else
              # newer dirs exist beyond the last tag: this is a pre-release run
              # exclude the last release's tools
              include_previous=false
            fi

            mkdir -p "package_index/${index_name}/${owner}/tools"
            for ver in ${versions}; do
              version_dir="${branch_dir}/${ver}/"
              echo ${version_dir}
              [ -n "$(ls "${version_dir}tools/*.json" 2>/dev/null)" ] || continue

              if $include_previous && version_gte "$ver" "$prev_release"; then
                include=true
              elif ! $include_previous && version_gt "$ver" "$last_release"; then
                include=true
              else
                include=false
              fi
              $include && cp "${version_dir}tools/"*.json "package_index/${index_name}/${owner}/tools/" 2>/dev/null || true
            done

            # Generate the final index
            (cd package_index && scripts/meld.py --ref-index prod.json "../pages/package_${index_name}_index.json" "${index_name}/")

            echo "::endgroup::"
          done

          # Export the prod index as well, for use as a reference in the HTML generation step
          cp package_index/prod.json pages/prod.json
          cp package_index/prod.json.srcmap pages/prod.json.srcmap

      - name: Generate index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls pages/
          python3 .github/scripts/generate-html-index.py --owner-repo ${{ github.repository }}
          rm pages/*.srcmap # not needed in the published folder

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: pages/

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
