name: Store snippets

# Triggered by satellite repos via the composite action in this repo.
# Runs in ci-builds's own context — uses the built-in GITHUB_TOKEN to commit.
# Satellite repos only need a fine-grained PAT with Actions:write on ci-builds
# (no Contents:write — they cannot push code directly).
# Source repo/branch are extracted from a cryptographically signed OIDC token
# issued by GitHub — they cannot be forged by the caller.
# The JSON payload is downloaded directly from the satellite's artifact store
# using the artifact_token, avoiding workflow_dispatch input size limits.
on:
  workflow_dispatch:
    inputs:
      artifact_id:
        description: ID of the artifact uploaded by the satellite workflow (resolved by the composite action).
        required: true
        type: string
      artifact_token:
        description: >
          Token with actions:read on the satellite repository.
          Used to download the artifact. Treated as a secret — masked in logs.
        required: true
        type: string
      oidc_token:
        description: >
          OIDC JWT obtained by the satellite workflow via core.getIDToken('<this repo>').
          Used to cryptographically verify the caller's repository and branch.
        required: true
        type: string
      base_branch:
        description: >
          Branch the tag was cut from. Required when the satellite triggers this workflow
          from a tag ref — snippets will be stored under that branch's folder.
          Ignored when the ref is already a branch.
        required: false
        type: string
      version:
        description: >
          Build version string (e.g. "1.2.3" or "1.2.3-rc1").
          Only the maj.min.rev portion is used for the storage path.
        required: true
        type: string

permissions:
  contents: write

jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci-builds
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.CI_BUILDS_CONTENT_TOKEN }}


      - name: Install PyJWT
        run: pip install --quiet "PyJWT[crypto]"

      - name: Verify OIDC token and extract source identity
        id: verify-oidc
        env:
          OIDC_TOKEN: ${{ inputs.oidc_token }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request
          import jwt
          from jwt.algorithms import RSAAlgorithm

          token = os.environ['OIDC_TOKEN']

          with urllib.request.urlopen(
              'https://token.actions.githubusercontent.com/.well-known/jwks'
          ) as r:
              jwks = json.load(r)

          header = jwt.get_unverified_header(token)
          key_data = next((k for k in jwks['keys'] if k['kid'] == header['kid']), None)
          if not key_data:
              print('::error::No matching key in GitHub JWKS', file=sys.stderr)
              sys.exit(1)

          try:
              payload = jwt.decode(
                  token,
                  RSAAlgorithm.from_jwk(key_data),
                  algorithms=['RS256'],
                  issuer='https://token.actions.githubusercontent.com',
                  audience='${{ github.repository }}',
              )
          except jwt.ExpiredSignatureError:
              print('::error::OIDC token has expired', file=sys.stderr)
              sys.exit(1)
          except jwt.InvalidTokenError as e:
              print(f'::error::OIDC token invalid: {e}', file=sys.stderr)
              sys.exit(1)

          repo = payload['repository']
          ref = payload['ref']

          if ref.startswith('refs/heads/'):
              branch = ref.removeprefix('refs/heads/')
          elif ref.startswith('refs/tags/'):
              base_branch = os.environ.get('BASE_BRANCH', '').strip()
              if not base_branch:
                  print('::error::base_branch input is required when triggering from a tag ref', file=sys.stderr)
                  sys.exit(1)
              branch = base_branch
              print(f'Tag ref {ref!r} mapped to branch {branch!r} via base_branch input')
          else:
              print(f'::error::Unrecognised ref format {ref!r}', file=sys.stderr)
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f'source_repo={repo}', file=f)
              print(f'source_branch={branch}', file=f)

          print(f'Verified source: {repo}@{branch}')
          EOF

      - name: Download snippets artifact
        env:
          GH_TOKEN: ${{ inputs.artifact_token }}
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          echo "::add-mask::$GH_TOKEN"

          mkdir -p /tmp/snippets
          gh api \
            "/repos/$SOURCE_REPO/actions/artifacts/$ARTIFACT_ID/zip" \
            > /tmp/snippets.zip

          unzip -q /tmp/snippets.zip -d /tmp/snippets/
          echo "Downloaded and extracted artifact $ARTIFACT_ID"

      - name: Validate and prepare
        env:
          VERSION: ${{ inputs.version }}
        run: |
          FOUND=0
          while IFS= read -r -d '' filepath; do
            relpath="${filepath#/tmp/snippets/}"
            dir="${relpath%%/*}"
            if ! echo "$relpath" | grep -qE "^(platforms|tools|metadata)/"; then
              echo "::error::Invalid snippet path '$relpath': top-level directory must be platforms/, tools/, or metadata/"
              exit 1
            fi
            jq -e 'type == "object"' "$filepath" > /dev/null || {
              echo "::error::$relpath is not a JSON object"
              exit 1
            }
            FOUND=$((FOUND + 1))
          done < <(find /tmp/snippets -name "*.json" -type f -print0)

          if [ "$FOUND" -eq 0 ]; then
            echo "::error::No JSON files found in artifact"
            exit 1
          fi

          VERSION_SHORT=$(echo "$VERSION" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          echo "VERSION_SHORT=$VERSION_SHORT" >> $GITHUB_ENV

      - name: Write snippet files
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
        run: |
          VERSION_DIR="snippets/${SOURCE_REPO}/${SOURCE_BRANCH}/${VERSION_SHORT}"

          while IFS= read -r -d '' filepath; do
            relpath="${filepath#/tmp/snippets/}"
            dir=$(dirname "$relpath")
            base=$(basename "$relpath")

            if [ "$dir" == "tools" ] ; then
              # Tools snippets do not share the core version, so avoid appending the version to the filename.
              target="${VERSION_DIR}/${dir}/${base}"
            else
              # Platforms and metadata snippets are versioned with the core version, so append the version to the filename.
              target="${VERSION_DIR}/${dir}/${VERSION}-${base}"
            fi

            mkdir -p "$(dirname "$target")"
            jq '.' "$filepath" > "$target"
            echo "Wrote $target"
          done < <(find /tmp/snippets -name "*.json" -type f -print0)

      - name: Record full release version
        if: ${{ env.VERSION_SHORT == inputs.version }}
        env:
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
        run: |
          TAG_FILE="snippets/${SOURCE_REPO}/${SOURCE_BRANCH}/tagged-versions"
          mkdir -p "$(dirname "$TAG_FILE")"
          echo "$VERSION_SHORT" >> "$TAG_FILE"
          echo "Recorded full release ${VERSION_SHORT} in tagged-versions"

      - name: Commit and push (with retry)
        env:
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name  "Arduinobot"
          git config user.email "bot@arduino.cc"
          git add snippets/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          ADDED=$(git diff --cached --name-only --diff-filter=AM)
          DELETED=$(git diff --cached --name-only --diff-filter=DM)

          [ -n "$DELETED" ] && FORCE="force-push "
          echo "ci: ${SOURCE_REPO}@${SOURCE_BRANCH} (${FORCE}${VERSION})" > COMMIT_MSG
          echo >> COMMIT_MSG
          echo "Snippets stored:" >> COMMIT_MSG
          echo "$ADDED" | sed 's/^/  - /' >> COMMIT_MSG
          if [ -n "$DELETED" ]; then
            echo >> COMMIT_MSG
            echo "Replaced files:" >> COMMIT_MSG
            echo "$DELETED" | sed 's/^/  - /' >> COMMIT_MSG
          fi
          git commit -F COMMIT_MSG

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase
          done
