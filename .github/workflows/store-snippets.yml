name: Store snippets

# Triggered by satellite repos via the GitHub API.
# Runs in ci-builds's own context — uses the built-in GITHUB_TOKEN to commit.
# Satellite repos only need a fine-grained PAT with Actions:write on ci-builds
# (no Contents:write — they cannot push code directly).
# Source repo/branch are extracted from a cryptographically signed OIDC token
# issued by GitHub — they cannot be forged by the caller.
on:
  workflow_dispatch:
    inputs:
      snippets:
        description: >
          JSON object mapping filename to JSON object.
          Example: {"build-info.json": {"version":"1.0","sha":"abc"}, "tests.json": {"passed":42}}
        required: true
        type: string
      oidc_token:
        description: >
          OIDC JWT obtained by the satellite workflow via core.getIDToken('arduino/ci-builds').
          Used to cryptographically verify the caller's repository and branch.
        required: true
        type: string
      base_branch:
        description: >
          Branch the tag was cut from. Required when the satellite triggers this workflow
          from a tag ref — snippets will be stored under that branch's folder.
          Ignored when the ref is already a branch.
        required: false
        type: string
      snippet_type:
        description: >
          Type of snippet being stored. Use 'platform' for platform build metadata
          (stored under platforms/) or 'tool' for tool build metadata (stored under tools/).
        required: false
        type: string
        default: platform
      version:
        description: >
          Build version string (e.g. "1.2.3" or "1.2.3-rc1").
          Only the maj.min.rev portion is used for the storage path.
        required: true
        type: string
      metadata:
        description: >
          JSON object mapping filename to JSON object, storing per-build metadata.
          Example: {"build.json": {"sha":"abc","url":"https://..."}}
          Written to snippets/{owner}/{repo}/{branch}/metadata/.
          Optional — omit if no per-run metadata is needed.
        required: false
        type: string

permissions:
  contents: write

jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci-builds
        uses: actions/checkout@v6
        # GITHUB_TOKEN is used implicitly — no external secret needed

      - name: Install PyJWT
        run: pip install --quiet "PyJWT[crypto]"

      - name: Verify OIDC token and extract source identity
        id: verify-oidc
        env:
          OIDC_TOKEN: ${{ inputs.oidc_token }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request
          import jwt
          from jwt.algorithms import RSAAlgorithm

          token = os.environ['OIDC_TOKEN']

          with urllib.request.urlopen(
              'https://token.actions.githubusercontent.com/.well-known/jwks'
          ) as r:
              jwks = json.load(r)

          header = jwt.get_unverified_header(token)
          key_data = next((k for k in jwks['keys'] if k['kid'] == header['kid']), None)
          if not key_data:
              print('::error::No matching key in GitHub JWKS', file=sys.stderr)
              sys.exit(1)

          try:
              payload = jwt.decode(
                  token,
                  RSAAlgorithm.from_jwk(key_data),
                  algorithms=['RS256'],
                  issuer='https://token.actions.githubusercontent.com',
                  audience='arduino/ci-builds',
              )
          except jwt.ExpiredSignatureError:
              print('::error::OIDC token has expired', file=sys.stderr)
              sys.exit(1)
          except jwt.InvalidTokenError as e:
              print(f'::error::OIDC token invalid: {e}', file=sys.stderr)
              sys.exit(1)

          repo = payload['repository']
          ref = payload['ref']

          if ref.startswith('refs/heads/'):
              branch = ref.removeprefix('refs/heads/')
          elif ref.startswith('refs/tags/'):
              base_branch = os.environ.get('BASE_BRANCH', '').strip()
              if not base_branch:
                  print('::error::base_branch input is required when triggering from a tag ref', file=sys.stderr)
                  sys.exit(1)
              branch = base_branch
              print(f'Tag ref {ref!r} mapped to branch {branch!r} via base_branch input')
          else:
              print(f'::error::Unrecognised ref format {ref!r}', file=sys.stderr)
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f'source_repo={repo}', file=f)
              print(f'source_branch={branch}', file=f)

          print(f'Verified source: {repo}@{branch}')
          EOF

      - name: Validate snippets
        env:
          SNIPPETS: ${{ inputs.snippets }}
          SNIPPET_TYPE: ${{ inputs.snippet_type }}
          METADATA: ${{ inputs.metadata }}
          VERSION: ${{ inputs.version }}
        run: |
          echo "$SNIPPETS" | jq -e 'type == "object" and (to_entries | all(.value | type == "object"))' \
            || { echo "::error::snippets must be a JSON object whose values are JSON objects"; exit 1; }
          [[ "$SNIPPET_TYPE" == "platform" || "$SNIPPET_TYPE" == "tool" ]] \
            || { echo "::error::snippet_type must be 'platform' or 'tool' (got '$SNIPPET_TYPE')"; exit 1; }
          if [[ -n "$METADATA" ]]; then
            echo "$METADATA" | jq -e 'type == "object"' \
              || { echo "::error::metadata must be a JSON object whose values are JSON objects"; exit 1; }
          fi
          VERSION_SHORT=$(echo "$VERSION" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          echo "VERSION_SHORT=$VERSION_SHORT" >> $GITHUB_ENV

      - name: Write snippet files
        env:
          SNIPPETS: ${{ inputs.snippets }}
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
          SNIPPET_TYPE: ${{ inputs.snippet_type }}
        run: |
          TARGET_DIR="snippets/${SOURCE_REPO}/${SOURCE_BRANCH}/${VERSION_SHORT}/${SNIPPET_TYPE}s"
          mkdir -p "$TARGET_DIR"

          echo "$SNIPPETS" | jq -r 'to_entries[] | "\(.key)\t\(.value)"' | \
          while IFS=$'\t' read -r filename content; do
            echo "$content" | jq '.' > "$TARGET_DIR/$filename"
            echo "Wrote $TARGET_DIR/$filename"
          done

      - name: Write metadata files
        if: ${{ inputs.metadata != '' }}
        env:
          METADATA: ${{ inputs.metadata }}
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
        run: |
          TARGET_DIR="snippets/${SOURCE_REPO}/${SOURCE_BRANCH}/metadata"
          mkdir -p "$TARGET_DIR"

          echo "$METADATA" | jq -r 'to_entries[] | "\(.key)\t\(.value)"' | \
          while IFS=$'\t' read -r filename content; do
            echo "$content" | jq '.' > "$TARGET_DIR/$filename"
            echo "Wrote $TARGET_DIR/$filename"
          done

      - name: Commit and push (with retry)
        env:
          SOURCE_REPO: ${{ steps.verify-oidc.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.verify-oidc.outputs.source_branch }}
          SNIPPET_TYPE: ${{ inputs.snippet_type }}
          VERSION: ${{ inputs.version }}
          HAS_METADATA: ${{ inputs.metadata != '' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snippets/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "ci: ${SNIPPET_TYPE}s from ${SOURCE_REPO}@${SOURCE_BRANCH} (${VERSION})"

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase
          done
