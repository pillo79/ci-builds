name: Store CI build snippets
description: >
  Dispatch store-snippets.yml in arduino/ci-builds.
  Passes the artifact name and a download token — store-snippets.yml downloads
  the artifact directly, so the JSON payload never travels as a workflow_dispatch
  input (avoiding GitHub's input size limit).

  Requires the calling job to have 'id-token: write' permission (inherited
  by composite action steps at runtime).

  The action runs inline on the calling job's runner (composite action), so it
  has full access to files written by prior steps in the same job.

inputs:
  artifact:
    description: >
      Name of the artifact containing JSON files to be assembled into the
      snippets object. Each .json file is stored using its relative path as the
      key. Subdirectories are walked recursively.
      Keys must start with 'platforms/', 'tools/', or 'metadata/'.
      Example layout:
        platforms/build-info.json
        tools/gcc.json
        metadata/ci.json
    required: true
  version:
    description: Build version string (e.g. "1.2.3" or "1.2.3-rc1").
    required: true
  token:
    description: >
      PAT or token with Actions:write on this repo.
      Used to authenticate the workflow_dispatch call.
    required: true
  base-branch:
    description: >
      Branch the tag was cut from. Required only when triggering from a tag ref.
      Ignored for branch refs.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve artifact ID
      id: artifact
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        ARTIFACT_NAME: ${{ inputs.artifact }}
      run: |
        ARTIFACT_ID=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
          --jq '.artifacts[] | select(.name == "'"$ARTIFACT_NAME"'") | .id')
        if [ -z "$ARTIFACT_ID" ]; then
          echo "::error::Artifact '$ARTIFACT_NAME' not found in run $GITHUB_RUN_ID"
          exit 1
        fi
        echo "id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"

    - name: Dispatch store-snippets
      env:
        THIS_REPO: ${{ github.action_repository }}
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.token }}
        script: |
          const [action_owner, action_repo] = '${{ env.THIS_REPO }}'.split('/');
          const oidcToken = await core.getIDToken('${{ env.THIS_REPO }}');

          await github.rest.actions.createWorkflowDispatch({
            owner: action_owner,
            repo: action_repo,
            workflow_id: 'store-snippets.yml',
            ref: 'main',
            inputs: {
              artifact_id: '${{ steps.artifact.outputs.id }}',
              artifact_token: '${{ github.token }}',
              oidc_token:  oidcToken,
              version:     '${{ inputs.version }}',
              base_branch: '${{ inputs.base-branch }}',
            },
          });
